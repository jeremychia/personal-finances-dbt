version: 2
models:
  - name: fact_bank_transactions
    description: |
      Core bank transaction table across all accounts and currencies. Each row is one transaction from any bank, in its original currency with merchant/description.

      Granularity: One row per bank transaction
      Filters: None
      Keywords: transactions, banking, payments, transfers, multi-currency, credit-card, checking-account
    columns:
      - name: bank_source
        description: Source bank/account identifier (e.g. "adjustments-sgd", "amex_payback-cc", "amex_rose-cc").
      - name: local_date
        description: Transaction date in local timezone (e.g. "2018-08-01", "2018-08-11", "2018-08-12").
      - name: local_currency
        description: Transaction currency code (SGD, EUR, USD, etc.) (e.g. "CHF", "EUR", "GBP").
      - name: local_amount
        description: Transaction amount in local currency (negative for debits, positive for credits) (e.g. "-32539.0", "-24999.0", "-23000.0").
      - name: category
        description: Transaction category for expense tracking (e.g. "Allowance", "Bank Charge", "Books").
      - name: description
        description: Transaction description or merchant name (e.g. "  ", "  CASH REBATE", " 0016RF9246128 SOAP CYCLING (SINGAP").
