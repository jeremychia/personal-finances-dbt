version: 2
models:
  - name: dim_categories
    description: |
      Lookup table mapping transactions to their category hierarchy. Each transaction rolls up through category → category2 → category3, with fixed vs. variable classification for budgeting.

      Granularity: One row per unique category
      Filters: None
      Keywords: categories, expenses, income, classification, hierarchy
    columns:
      - name: category
        description: Primary transaction category (unique identifier) (e.g. "Allowance", "Bank Charge", "Books").
        tests:
          - unique
      - name: category2
        description: Secondary category grouping (e.g. "Contributions", "Extras", "Income").
      - name: category3
        description: Tertiary category grouping (e.g. "Capital", "Expense", "Income").
      - name: fixed_vs_variable
        description: Classification as fixed or variable expense (e.g. "Capital", "Fixed", "Investment").
  - name: dim_dates
    description: |
      Calendar table with day-level attributes. Enables time-series analysis with ISO week numbers, day-of-week, and day-of-year for joining with transaction and balance tables.

      Granularity: One row per calendar date (2018-01-01 through 2028-12-31)
      Filters: None
      Keywords: calendar, dates, time, day-of-week, week-of-year
    columns:
      - name: local_date
        description: Calendar date (primary key) (e.g. "2018-01-01", "2018-01-02", "2018-01-03").
      - name: day_of_week_iso
        description: ISO day of week (1=Monday, 7=Sunday)
      - name: day_of_month
        description: Day number within month (1-31)
      - name: day_of_year
        description: Day number within year (1-366)
      - name: iso_week_of_year
        description: ISO week number within year (1-53)
