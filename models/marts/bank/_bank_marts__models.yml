version: 2
models:
  - name: mart_eur_bank_transactions
    description: |
      All bank transactions converted to EUR for European account analysis. Use this when you want to track spending in EUR or analyze multi-currency holdings.

      Granularity: One row per transaction
      Filters: None
      Keywords: EUR, transactions, multi-currency, expenses, categories
    columns:
      - name: bank_source
        description: Source bank/account identifier (e.g. "adjustments-sgd", "amex_payback-cc", "amex_rose-cc").
      - name: local_date
        description: Transaction date (e.g. "2018-08-01", "2018-08-11", "2018-08-12").
      - name: local_currency
        description: Original transaction currency (e.g. "CHF", "EUR", "GBP").
      - name: local_amount
        description: Original transaction amount (e.g. "-32539.0", "-24999.0", "-23000.0").
      - name: eur_currency
        description: EUR currency indicator.
      - name: eur_amount
        description: Transaction amount converted to EUR (e.g. "-20466.06704824203", "-19800.0", "-17000.0").
      - name: exchange_rate
        description: Exchange rate used for EUR conversion (e.g. "0.0024928331048236323", "0.002493579033987482", "0.002613490839714607").
      - name: category
        description: Primary transaction category (e.g. "Allowance", "Bank Charge", "Books").
      - name: category2
        description: Secondary category grouping (e.g. "Contributions", "Extras", "Income").
      - name: category3
        description: Tertiary category grouping (e.g. "Capital", "Expense", "Income").
      - name: fixed_vs_variable
        description: Fixed or variable expense classification (e.g. "Capital", "Fixed", "Investment").
      - name: description
        description: Transaction description (e.g. "  ", "  CASH REBATE", " 0016RF9246128 SOAP CYCLING (SINGAP").
  - name: mart_eur_bank_balances
    description: |
      Daily bank account balances converted to EUR, showing balance progression over time. Includes both current and historical spot rates for multi-currency accounts.

      Granularity: One row per date per bank source per currency
      Filters: Historical dates up to yesterday
      Keywords: EUR, balances, time-series, cash-positions, multi-currency
    columns:
      - name: local_date
        description: Balance date (e.g. "2018-01-01", "2018-01-02", "2018-01-03").
      - name: bank_source
        description: Source bank/account identifier (e.g. "adjustments-sgd", "amex_payback-cc", "amex_rose-cc").
      - name: local_currency
        description: Account currency (e.g. "CHF", "EUR", "GBP").
      - name: local_balance
        description: Balance in local currency (e.g. "-10296.67", "-10277.72", "-10155.38").
      - name: eur_currency
        description: EUR currency indicator.
      - name: eur_amount
        description: Balance converted to EUR at current rate (e.g. "-6480.78", "-6463.57", "-6456.67").
      - name: eur_spot_rate
        description: Balance converted to EUR at historical spot rate (e.g. "-6460.98", "-6449.05", "-6372.2").
      - name: exchange_rate
        description: Current exchange rate (e.g. "0.002322071287588529", "0.002327475852438031", "0.002332470319315187").
      - name: sgd_fx_gain_loss
        description: FX gains/losses in SGD (for consistency)
  - name: mart_sgd_bank_transactions
    description: |
      All bank transactions converted to SGD. Use this for spending analysis, budgeting, and tracking where money goes across all accounts in a single currency.

      Granularity: One row per transaction
      Filters: None
      Keywords: SGD, transactions, multi-currency, expenses, categories
    columns:
      - name: bank_source
        description: Source bank/account identifier (e.g. "adjustments-sgd", "amex_payback-cc", "amex_rose-cc").
      - name: local_date
        description: Transaction date (e.g. "2018-08-01", "2018-08-11", "2018-08-12").
      - name: local_currency
        description: Original transaction currency (e.g. "CHF", "EUR", "GBP").
      - name: local_amount
        description: Original transaction amount (e.g. "-32539.0", "-24999.0", "-23000.0").
      - name: sgd_currency
        description: SGD currency indicator.
      - name: sgd_amount
        description: Transaction amount converted to SGD (e.g. "-32539.0", "-29361.420000000002", "-24999.0").
      - name: exchange_rate
        description: Exchange rate used for SGD conversion (e.g. "0.003462794465910507", "0.003496496521457247", "0.0038311162219376417").
      - name: category
        description: Primary transaction category (e.g. "Allowance", "Bank Charge", "Books").
      - name: category2
        description: Secondary category grouping (e.g. "Contributions", "Extras", "Income").
      - name: category3
        description: Tertiary category grouping (e.g. "Capital", "Expense", "Income").
      - name: fixed_vs_variable
        description: Fixed or variable expense classification (e.g. "Capital", "Fixed", "Investment").
      - name: description
        description: Transaction description (e.g. "  ", "  CASH REBATE", " 0016RF9246128 SOAP CYCLING (SINGAP").
  - name: mart_sgd_bank_balances
    description: |
      Daily bank account balances converted to SGD, showing balance progression over time. Includes both current and historical spot rates for multi-currency accounts.

      Granularity: One row per date per bank source per currency
      Filters: Historical dates up to yesterday
      Keywords: SGD, balances, time-series, cash-positions, multi-currency
    columns:
      - name: local_date
        description: Balance date (e.g. "2018-01-01", "2018-01-02", "2018-01-03").
      - name: bank_source
        description: Source bank/account identifier (e.g. "adjustments-sgd", "amex_payback-cc", "amex_rose-cc").
      - name: local_currency
        description: Account currency (e.g. "CHF", "EUR", "GBP").
      - name: local_balance
        description: Balance in local currency (e.g. "-10296.67", "-10277.72", "-10155.38").
      - name: sgd_currency
        description: SGD currency indicator.
      - name: sgd_amount
        description: Balance converted to SGD at current rate (e.g. "-10296.67", "-10277.72", "-10155.38").
      - name: sgd_spot_rate
        description: Balance converted to SGD at historical spot rate (e.g. "-10296.67", "-10277.72", "-10155.38").
      - name: exchange_rate
        description: Current exchange rate (e.g. "0.0032390572390572393", "0.0032447340858838586", "0.003255254553946754").
      - name: sgd_fx_gain_loss
        description: FX gains/losses in SGD (e.g. "-2990.89", "-2984.48", "-2978.13").
